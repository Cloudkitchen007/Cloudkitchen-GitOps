

grafana:
 
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  adminPassword: "cloudkitchen-admin"
  defaultDashboardsEnabled: true      
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

prometheus:
  prometheusSpec:
    retention: 6h 
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    
    serviceMonitorSelectorNilUsesHelmValues: false


alertmanager:
  enabled: true
  alertmanagerSpec:
    secrets:
      - alertmanager-slack
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-notifications
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: slack-notifications
          matchers:
            - severity =~ "warning|critical"
    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook
            channel: "#cloudkitchen-alerts"
            send_resolved: true
            title: "{{ .Status | toUpper }} · {{ .CommonLabels.alertname }}"
            text: >-
              {{ range .Alerts }}*{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              namespace: `{{ .Labels.namespace }}` · severity: `{{ .Labels.severity }}`
              {{ end }}

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
