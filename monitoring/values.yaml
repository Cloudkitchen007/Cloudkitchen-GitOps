# kube-prometheus-stack values for CloudKitchen
# Installs Prometheus + Grafana + node-exporter + kube-state-metrics with
# out-of-the-box Kubernetes dashboards. Grafana is exposed via a public NLB so
# the dashboard is reachable from any laptop (no port-forward / localhost).

grafana:
  # Public link (AWS NLB) — shareable for the demo.
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  adminPassword: "cloudkitchen-admin" # demo only — rotate for real use
  defaultDashboardsEnabled: true      # K8s cluster/node/pod dashboards
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

prometheus:
  prometheusSpec:
    retention: 6h # keep it light for a small cluster
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
    # Auto-discover ServiceMonitors in all namespaces (so app /metrics can be added later)
    serviceMonitorSelectorNilUsesHelmValues: false

# Alertmanager → Slack. Uses the stack's built-in Prometheus alert rules
# (KubePodCrashLooping, KubePodNotReady, KubeNodeNotReady, high memory, target
# down, etc.) so real alerts fire to Slack automatically — great for a demo.
# The webhook stays in the `alertmanager-slack` secret (created by install.sh),
# never in git.
alertmanager:
  enabled: true
  alertmanagerSpec:
    secrets:
      - alertmanager-slack # mounted at /etc/alertmanager/secrets/alertmanager-slack/webhook
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-notifications
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: slack-notifications
          matchers:
            - severity =~ "warning|critical"
    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook
            channel: "#cloudkitchen-alerts"
            send_resolved: true
            title: "{{ .Status | toUpper }} · {{ .CommonLabels.alertname }}"
            text: >-
              {{ range .Alerts }}*{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              namespace: `{{ .Labels.namespace }}` · severity: `{{ .Labels.severity }}`
              {{ end }}

prometheus-node-exporter:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
