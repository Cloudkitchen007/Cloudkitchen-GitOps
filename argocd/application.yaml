apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudkitchen
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloudkitchen
  source:
    # ── Point this at your cloudkitchen-gitops org repo after you create it ──
    repoURL: https://github.com/<YOUR-ORG>/cloudkitchen-gitops.git
    targetRevision: main
    path: helm/cloudkitchen
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
