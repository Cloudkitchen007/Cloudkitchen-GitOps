apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cloudkitchen
  namespace: argocd
spec:
  description: CloudKitchen backend microservices
  sourceRepos:
    - "*"           
  destinations:
    - server: https://kubernetes.default.svc
      namespace: production
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
