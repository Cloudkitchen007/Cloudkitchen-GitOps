# =============================================================================
# CloudKitchen Helm values — PROD ENVIRONMENT
# =============================================================================
# Production-grade replicas, image tags from main branch, full resources

global:
  region: ap-south-1
  accountId: "256603361470"
  ecrRegistry: "256603361470.dkr.ecr.ap-south-1.amazonaws.com"

imageTags:
  menu: "14bab659e6b85b7eb464b829e67d107942b1913f"
  order: "14bab659e6b85b7eb464b829e67d107942b1913f"
  auth: "irsa-sts-fix"
  ai: "14bab659e6b85b7eb464b829e67d107942b1913f"

config:
  hfModel: "mistralai/Mistral-7B-Instruct-v0.3"

irsa:
  aiRoleArn:    "arn:aws:iam::256603361470:role/cloudkitchen-ai-irsa"
  orderRoleArn: "arn:aws:iam::256603361470:role/cloudkitchen-order-irsa"
  esoRoleArn:   "arn:aws:iam::256603361470:role/cloudkitchen-eso-irsa"
  authRoleArn:  "arn:aws:iam::256603361470:role/cloudkitchen-auth-irsa"

eso:
  region: ap-south-1
  appSecretName: "cloudkitchen/app/runtime"
  dbSecretName:  "cloudkitchen/db/credentials-new"

gateway:
  name: cloudkitchen-gateway
  className: kgateway
  lbAnnotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

services:
  - name: menu
    repo: cloudkitchen-menu-repo
    port: 8080
    replicas: 2
    pathPrefixes: ["/api"]
  - name: order
    repo: cloudkitchen-order-repo
    port: 8082
    replicas: 2
    serviceAccount: order
    pathPrefixes: ["/api/orders"]
  - name: auth
    repo: cloudkitchen-auth-repo
    port: 8001
    replicas: 2
    serviceAccount: auth
    pathPrefixes: ["/auth"]
  - name: ai
    repo: cloudkitchen-ai-repo
    port: 8000
    replicas: 2
    serviceAccount: ai
    disableOtel: true
    pathPrefixes:
      - "/api/recommend"
      - "/api/recommend_quick"
      - "/api/recommend_forecast"
      - "/api/demand"
      - "/api/update_user_preferences"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
