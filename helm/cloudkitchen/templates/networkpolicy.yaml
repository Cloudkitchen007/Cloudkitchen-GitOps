
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
spec:
 
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: cloudkitchen
  policyTypes: ["Ingress"]
  ingress:
    - from:
       
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
