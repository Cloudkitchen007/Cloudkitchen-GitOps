# Default-deny all ingress in the namespace, then allow only the kgateway Envoy
# proxy to reach the app pods. Egress is left open (pods need RDS/SQS/Cognito/HF
# + DNS). Kubelet health probes are exempt from NetworkPolicy, so probes still work.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
spec:
  # Applies to all CloudKitchen app pods
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: cloudkitchen
  policyTypes: ["Ingress"]
  ingress:
    - from:
        # Allow the kgateway data-plane (Envoy) running in kgateway-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
