# External Secrets Operator: pulls from AWS Secrets Manager (via IRSA, no keys)
# and materializes the `cloudkitchen-secrets` Kubernetes Secret the pods consume.
#
# Flow:  AWS Secrets Manager  →  ESO (IRSA auth)  →  K8s Secret  →  Pods
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.eso.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudkitchen-secrets
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: cloudkitchen-secrets
    creationPolicy: Owner
  # All non-password app config comes from the consolidated app-runtime secret…
  dataFrom:
    - extract:
        key: {{ .Values.eso.appSecretName | quote }}
  # …and the DB password is pulled from the RDS-managed secret.
  data:
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.eso.dbSecretName | quote }}
        property: password
