# Default SA for menu/order/auth — they reach AWS only via credentials in the
# synced Secret, so they need no IRSA role.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudkitchen-default
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
---
# AI SA — IRSA role grants SQS consume access (no static keys in the pod).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.irsa.aiRoleArn | quote }}
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
---
# Order SA — IRSA role grants SQS send access (publishes OrderPlaced events).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.irsa.orderRoleArn | quote }}
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
---
# External Secrets Operator SA — IRSA role grants Secrets Manager read.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.irsa.esoRoleArn | quote }}
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
