
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    {{- include "cloudkitchen.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
 
  infrastructure:
    annotations:
      {{- toYaml .Values.gateway.lbAnnotations | nindent 6 }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
